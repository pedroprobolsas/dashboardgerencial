[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0
user=root

; ── Backend Express ───────────────────────────────────────────────────────────
[program:backend]
command=node /backend/src/index.js
directory=/backend
autostart=true
autorestart=true
startretries=5
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

; ── Nginx (sirve el frontend y proxía /api al backend) ───────────────────────
[program:nginx]
command=nginx -g "daemon off;"
autostart=true
autorestart=true
startretries=5
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
