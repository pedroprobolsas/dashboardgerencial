name: 🚀 Build y Deploy — Dashboard Probolsas

# Se ejecuta automáticamente cuando haces "git push" a la rama main
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Construir imagen y actualizar VPS
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

      - name: 📥 Descargar código
        uses: actions/checkout@v4

      - name: 🔧 Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐳 Construir y subir imagen Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          target: production
          push: true
          tags: |
            ghcr.io/pedroprobolsas/dashboardgerencial:latest
            ghcr.io/pedroprobolsas/dashboardgerencial:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🔄 Actualizar servicio en el VPS por SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "Descargando nueva imagen..."
            docker pull ghcr.io/pedroprobolsas/dashboardgerencial:latest
            echo "Actualizando servicio..."
            docker service update \
              --image ghcr.io/pedroprobolsas/dashboardgerencial:latest \
              --force \
              probolsas-dashboard_dashboard
            echo "✅ Servicio actualizado correctamente"

      - name: 📋 Resumen del deploy
        run: |
          echo "### ✅ Deploy completado" >> $GITHUB_STEP_SUMMARY
          echo "- **Imagen:** ghcr.io/pedroprobolsas/dashboardgerencial:latest" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Sitio:** https://ippgerencia.probolsas.co" >> $GITHUB_STEP_SUMMARY
